<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <style>
    /* Neo-Brutalist and Pixel Art styling */
    .mascot-head { fill: #3DDC84; stroke: #000000; stroke-width: 6; stroke-linejoin: miter; shape-rendering: crispEdges; }
    
    /* Changed hoodie to dark gray so the black borders are actually visible */
    .mascot-body { fill: #3B3B3B; stroke: #000000; stroke-width: 6; stroke-linejoin: miter; shape-rendering: crispEdges; } 
    .mascot-pocket { fill: #222222; stroke: #000000; stroke-width: 4; stroke-linejoin: miter; shape-rendering: crispEdges; }
    
    .mascot-dark { fill: #000000; shape-rendering: crispEdges; }
    .mascot-eyes { fill: #000000; stroke: #000000; stroke-width: 4; shape-rendering: crispEdges; }
    
    /* 0.2s animation for high-speed spamming */
    @keyframes smash-btn {
      0%, 70% { transform: translate(0px, 0px); }
      100% { transform: translate(12px, 12px); }
    }
    @keyframes smash-text {
      0%, 70% { transform: translate(0px, 0px); }
      100% { transform: translate(12px, 12px); }
    }
    @keyframes smash-arm {
      0%, 70% { transform: translate(0px, 0px); }
      100% { transform: translate(0px, 45px); }
    }
    @keyframes strike-flash {
      0%, 80% { opacity: 0; }
      90%, 100% { opacity: 1; }
    }

    .btn-rect { animation: smash-btn 0.2s infinite alternate; fill: #3DDC84; stroke: #000000; stroke-width: 8; shape-rendering: crispEdges; }
    .btn-text { animation: smash-text 0.2s infinite alternate; font-family: 'Courier New', monospace; font-weight: 900; font-size: 32px; fill: #000000; }
    .smash-arm { animation: smash-arm 0.2s infinite alternate; }
    
    /* Upgraded Thunderbolt and Sparks */
    .lightning { animation: strike-flash 0.2s infinite alternate; fill: #FFFA00; stroke: #000000; stroke-width: 5; stroke-linejoin: miter; shape-rendering: crispEdges; }
    .spark { animation: strike-flash 0.2s infinite alternate; stroke: #3DDC84; stroke-width: 8; stroke-linecap: square; }
  </style>

  <path class="spark" d="M 50 240 L 10 200 M 350 240 L 390 200 M 90 220 L 60 170 M 310 220 L 340 170" />

  <rect x="72" y="262" width="256" height="80" fill="#000000" />
  <rect x="60" y="250" width="256" height="80" class="btn-rect" />
  <text x="188" y="302" class="btn-text" text-anchor="middle">SYNCSTRIKE</text>

  <g transform="translate(140, 75)">
    <rect x="20" y="0" width="10" height="10" class="mascot-dark" />
    <rect x="30" y="10" width="10" height="10" class="mascot-dark" />
    <rect x="90" y="0" width="10" height="10" class="mascot-dark" />
    <rect x="80" y="10" width="10" height="10" class="mascot-dark" />

    <path d="M 20 50 L 20 40 L 30 40 L 30 30 L 40 30 L 40 20 L 80 20 L 80 30 L 90 30 L 90 40 L 100 40 L 100 50 Z" class="mascot-head" />
    
    <rect x="30" y="28" width="12" height="12" class="mascot-eyes" />
    <rect x="75" y="28" width="12" height="12" class="mascot-eyes" />
    
    <path d="M 15 55 L 105 55 L 105 105 L 90 105 L 90 115 L 30 115 L 30 105 L 15 105 Z" class="mascot-body" />
    
    <path d="M 35 80 L 85 80 L 95 105 L 25 105 Z" class="mascot-pocket" />
    
    <rect x="30" y="115" width="15" height="20" class="mascot-head" />
    <rect x="75" y="115" width="15" height="20" class="mascot-head" />
    
    <rect x="-5" y="55" width="20" height="50" class="mascot-body" />
    
    <g class="smash-arm">
      <rect x="105" y="55" width="20" height="50" class="mascot-body" />
      <path d="M 110 100 L 90 145 L 110 145 L 95 190 L 135 135 L 115 135 Z" class="lightning" />
    </g>
  </g>
</svg>